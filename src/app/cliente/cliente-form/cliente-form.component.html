<div class="card my-3 bg-dark text-white">
    <div class="card-header">
        {{cliente.id ? 'Editar': 'Crear'}}
    </div>
    <div class="card-body">
        <ul class="alert alert-danger" *ngIf="errors?.length > 0">
            <li *ngFor="let error of errors">{{error}}</li>
        </ul>
        <form #formCliente="ngForm">
            <div class="form-group row">
                <label for="nombre" class="col-form-label" class="col-sm-2">
                    Nombre
                </label>
                <div class="col-sm-6">
                    <input type="text" class="form-control" name="nombre" [(ngModel)]="cliente.nombre"
                     #nombre="ngModel"> <!-- required -->
                    <div class="alert alert-danger" *ngIf="nombre.invalid && (nombre.dirty || nombre.touched)">
                        <div *ngIf="nombre.errors.required">
                            Nombre requerido
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group row">
                <label for="nombre" class="col-form-label" class="col-sm-2">
                    Apellido
                </label>
                <div class="col-sm-6">
                    <input type="text" class="form-control" name="apellido" [(ngModel)]="cliente.apellido"
                    #apellido="ngModel" > <!-- required -->
                    <div class="alert alert-danger" *ngIf="apellido.invalid && (apellido.dirty || apellido.touched)">
                        <div *ngIf="apellido.errors.required">
                            Apellido requerido
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group row">
                <label for="nombre" class="col-form-label" class="col-sm-2">
                    Email
                </label>
                <div class="col-sm-6">
                    <input type="email" class="form-control" name="email" [(ngModel)]="cliente.email"
                    #email="ngModel" > <!-- required -->
                    <div class="alert alert-danger" *ngIf="email.invalid && (email.dirty || email.touched)">
                        <div *ngIf="email.errors.required">
                            Email requerido
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group row">
                <div class="col-sm-6">
                    <button class="btn btn-primary" *ngIf="!cliente.id else updateBlock"
                     (click)="createCliente()" [disabled]="!formCliente.form.valid">Crear</button>
                    <ng-template #updateBlock>
                        <button class="btn btn-primary"
                         (click)="updateCliente()" [disabled]="!formCliente.form.valid">Editar</button>
                    </ng-template>
                    
                </div>
            </div>

        </form>

    </div>
</div>
