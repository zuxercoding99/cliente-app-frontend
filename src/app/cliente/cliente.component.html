<app-cliente-detalles
  *ngIf="clienteSeleccionado"
  [cliente]="clienteSeleccionado"
></app-cliente-detalles>

<div class="card my-3">
  <div class="card-header text-center bg-dark text-info">
    <h3>Listado de Clientes</h3>
  </div>
  <div class="card-body table-responsive">
    <div class="mb-2" *ngIf="auth.hasRole('ROLE_ADMIN')">
      <button class="btn btn-dark py-3" routerLink="/clientes/create">
        Crear Cliente
      </button>
    </div>

    <div class="alert alert-warning" *ngIf="error">
      Error al intentar conectar con el servidor.
    </div>

    <div class="alert alert-info" *ngIf="clientes?.length == 0">
      No hay registros de clientes disponibles.
    </div>

    <table class="table table-striped" *ngIf="clientes?.length > 0">
      <thead class="thead-light">
        <tr>
          <th scope="col" *ngIf="auth.hasRole('ROLE_ADMIN') || auth.hasRole('ROLE_USER')">
            #
          </th>
          <th scope="col">Nombre</th>
          <th scope="col">Apellido</th>
          <th scope="col">Email</th>
          <th scope="col">Fecha de Creación</th>
          <th *ngIf="auth.hasRole('ROLE_ADMIN')">Editar</th>
          <th *ngIf="auth.hasRole('ROLE_ADMIN')">Eliminar</th>
          <th *ngIf="auth.hasRole('ROLE_ADMIN')">Crear Factura</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cliente of clientes">
          <th scope="row" *ngIf="auth.hasRole('ROLE_ADMIN') || auth.hasRole('ROLE_USER')">
            <img
              (click)="abrirModal(cliente)"
              style="min-width: 64px;width: 64px;height:64px;cursor: pointer"
              class="rounded img-thumbnail d-inline-block"
              *ngIf="cliente?.foto"
              src="http://localhost:8080/api/v1/clientes/img/{{ cliente.foto }}"
            />

            <img
              (click)="abrirModal(cliente)"
              style="min-width: 64px;width: 64px;height:64px;cursor: pointer"
              class="rounded img-thumbnail"
              *ngIf="!cliente?.foto"
              src="http://localhost:8080/images/no-usuario.png"
            />
          </th>
          <td>{{ cliente.nombre }}</td>
          <td>{{ cliente.apellido }}</td>
          <td>{{ cliente.email }}</td>
          <td>{{ cliente.createdAt | date: 'EEEE dd, MMMM yyyy' }}</td>
          <td *ngIf="auth.hasRole('ROLE_ADMIN')">
            <button class="btn btn-warning btn-block" [routerLink]="['/clientes/edit', cliente.id]">
              Editar
            </button>
          </td>
          <td *ngIf="auth.hasRole('ROLE_ADMIN')">
            <button class="btn btn-danger btn-block" (click)="deleteCliente(cliente)">
              Eliminar
            </button>
          </td>
          <td *ngIf="auth.hasRole('ROLE_ADMIN')">
            <button
              class="btn btn-dark btn-block"
              [routerLink]="['/cliente', cliente.id, 'create-factura']"
            >
              Crear Factura
            </button>
          </td>
        </tr>
      </tbody>
    </table>
    <app-paginador class="my-3" *ngIf="paginador" [paginador]="paginador"></app-paginador>
  </div>
</div>
