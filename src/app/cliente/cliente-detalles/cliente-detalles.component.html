<div *ngIf="modalService.modal" class="modal" tabindex="-1" role="dialog" style="display: block;">
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Detalle de Cliente</h5>
        <button
          type="button"
          class="close"
          data-dismiss="modal"
          aria-label="Close"
          (click)="cerrarModal()"
        >
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <div class="container">
          <div class="row">
            <div class="col-sm">
              <ul class="list-group mb-3" *ngIf="cliente">
                <li class="list-group-item active">{{ cliente.nombre }}</li>
                <li class="list-group-item">{{ cliente.apellido }}</li>
                <li class="list-group-item">{{ cliente.email }}</li>
                <li class="list-group-item">{{ cliente.createdAt }}</li>
                <li class="list-group-item">{{ cliente.region.nombre }}</li>
              </ul>
              <div class="input-group" *ngIf="auth.hasRole('ROLE_ADMIN')">
                <div class="custom-file">
                  <input
                    (change)="seleccionarFoto($event)"
                    type="file"
                    class="custom-file-input"
                    id="inputFoto"
                  />
                  <label class="custom-file-label" for="inputFoto">Seleccionar Imagen</label>
                </div>
                <div class="input-group-append">
                  <button (click)="subirFoto()" class="btn btn-outline-secondary" type="button">
                    Subir
                  </button>
                </div>
              </div>

              <div class="progress" *ngIf="progreso > 0">
                <div
                  class="progress-bar progress-bar-striped bg-danger"
                  role="progressbar"
                  [ngStyle]="{ width: progreso + '%' }"
                  aria-valuenow="progreso"
                  aria-valuemin="0"
                  aria-valuemax="100"
                >
                  {{ progreso }}
                </div>
              </div>
            </div>
            <div class="col-sm">
              <img
                class="rounded img-thumbnail w-100"
                *ngIf="cliente?.foto; else imagenDefault"
                src="http://localhost:8080/api/v1/clientes/img/{{ cliente.foto }}"
              />
              <ng-template #imagenDefault>
                <img
                  class="rounded img-thumbnail w-100"
                  src="http://localhost:8080/images/no-usuario.png"
                />
              </ng-template>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button
            type="button"
            class="btn btn-secondary"
            data-dismiss="modal"
            (click)="cerrarModal()"
          >
            Close
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
