<mat-card class="container my-3" style="max-width: 550px">
  <mat-card-header>
    <mat-card-title>
      <h2>Sign In</h2>
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <form class="container" (ngSubmit)="login()">
      <mat-form-field class="w-100">
        <input
          matInput
          placeholder="Username"
          name="username"
          [(ngModel)]="usuario.username"
        />
      </mat-form-field>

      <mat-form-field class="w-100">
        <input
          type="password"
          matInput
          placeholder="Password"
          name="password"
          [(ngModel)]="usuario.password"
        />
      </mat-form-field>
      <button
        type="submit"
        mat-raised-button
        color="primary"
        class="btn-block py-1"
      >
        Sign In
      </button>
    </form>
  </mat-card-content>
</mat-card>
